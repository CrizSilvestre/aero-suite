<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aero Suite · PUJ</title>
  <style>
    :root { --navy: #1F3864; --navy-2: #2c4f8f; --line: #e5e9f0; --muted: #7a869a; --bg: #eef1f6; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif; background: var(--bg); }

    .suite-bar { display: flex; align-items: center; gap: 14px; height: 54px; padding: 0 16px; background: #fff;
      border-bottom: 1px solid var(--line); box-shadow: 0 1px 3px rgba(31,56,100,.05); position: relative; z-index: 2; }
    .suite-brand { font-weight: 700; color: var(--navy); display: flex; align-items: center; gap: 9px; font-size: 15px; }
    .suite-brand .logo { width: 26px; height: 26px; display: inline-flex; align-items: center; justify-content: center;
      border-radius: 8px; background: linear-gradient(135deg, var(--navy), var(--navy-2)); color: #fff; font-size: 14px; }
    .suite-brand small { font-weight: 400; color: var(--muted); }

    .swap { margin-left: auto; display: inline-flex; background: var(--bg); border: 1px solid var(--line); border-radius: 10px; padding: 3px; gap: 3px; }
    .swap button { border: 0; background: transparent; padding: 7px 14px; border-radius: 8px; font-size: 14px; color: #5b6b85;
      cursor: pointer; display: flex; align-items: center; gap: 7px; transition: background .15s ease, color .15s ease; }
    .swap button:hover { background: #e3e8f0; }
    .swap button.active { background: var(--navy); color: #fff; font-weight: 600; box-shadow: 0 1px 4px rgba(31,56,100,.25); }
    .swap button.soon { color: #98a4ba; }
    .swap button.soon:hover { background: #eef2f8; color: #5b6b85; }
    .swap .soon-tag { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: .5px;
      background: #ffd24d; color: #5a4500; border-radius: 999px; padding: 1px 6px; }
    .suite-toast { position: fixed; left: 50%; bottom: 54px; transform: translate(-50%, 12px); max-width: 88vw;
      background: var(--navy); color: #fff; padding: 11px 18px; border-radius: 12px; font-size: 14px; line-height: 1.35;
      box-shadow: 0 10px 34px rgba(31,56,100,.35); opacity: 0; pointer-events: none; transition: opacity .25s ease, transform .25s ease; z-index: 50; }
    .suite-toast.show { opacity: 1; transform: translate(-50%, 0); }
    .ripple { position: fixed; width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--navy);
      pointer-events: none; z-index: 60; transform: translate(-50%, -50%) scale(0); opacity: .55;
      animation: rippleOut .55s ease-out forwards; }
    @keyframes rippleOut { to { transform: translate(-50%, -50%) scale(1); opacity: 0; } }

    .stage { position: absolute; inset: 54px 0 30px 0; }
    .stage iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; display: none; background: var(--bg); }
    .stage iframe.show { display: block; }

    .suite-foot { position: absolute; left: 0; right: 0; bottom: 0; height: 30px; display: flex; align-items: center;
      justify-content: space-between; padding: 0 16px; background: #fff; border-top: 1px solid var(--line);
      font-size: 11.5px; color: var(--muted); z-index: 2; }
    .suite-foot .ver { font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 11.5px; background: var(--navy);
      border: 1px solid var(--navy); border-radius: 999px; padding: 2px 11px; color: #fff; font-weight: 700; letter-spacing: .4px;
      box-shadow: 0 1px 3px rgba(31,56,100,.25); }
  </style>
</head>
<body>
  <header class="suite-bar">
    <span class="suite-brand"><span class="logo">✈</span> Aero Suite <small>· Aeropuerto Internacional de Punta Cana (PUJ)</small></span>
    <nav class="swap" id="swap">
      <button data-tool="weather">🌦️ AeroWeather</button>
      <button data-tool="aipc">🛫 AIPC Planner</button>
      <button class="soon" data-soon title="Algo se cocina… 👀">✨ Próximamente <span class="soon-tag">pronto</span></button>
    </nav>
  </header>

  <main class="stage">
    <iframe id="f-weather" title="AeroWeather"></iframe>
    <iframe id="f-aipc" title="AIPC Planner"></iframe>
  </main>

  <footer class="suite-foot">
    <span>© <span id="yr">2026</span> CSilvestre · Aero Suite</span>
    <span class="ver" id="suite-ver" title="Versión cargada — sube al aplicar cambios. Si no cambia, el navegador no recargó.">v0.0.0</span>
  </footer>

  <div class="suite-toast" id="suite-toast" role="status" aria-live="polite"></div>

  <script>
    // Versión visible de la Suite. Subir SIEMPRE al aplicar un cambio: si tras desplegar
    // este número no cambia en el footer, el navegador sirvió la versión vieja (caché).
    const VERSION = 'v1.10.0';

    // Shell mínimo: alterna entre las dos apps (cada una corre intacta en su iframe).
    // Carga perezosa: el iframe recibe su src al mostrarse por primera vez (no carga las
    // dos apps pesadas a la vez). Cada app conserva su propio localStorage (claves
    // aerowx.* y aipc.*), así que sus destinatarios/firmas NO se comparten.
    const TOOLS = {
      weather: { frame: document.getElementById('f-weather'), src: 'weather/index.html' },
      aipc:    { frame: document.getElementById('f-aipc'),    src: 'aipc/index.html' },
    };
    const KEY = 'suite.tool';
    const btns = [...document.querySelectorAll('#swap button[data-tool]')];   // solo las apps reales

    function show(tool) {
      if (!TOOLS[tool]) tool = 'weather';
      for (const [k, t] of Object.entries(TOOLS)) {
        if (k === tool && !t.frame.src) t.frame.src = t.src;   // lazy-load la primera vez
        t.frame.classList.toggle('show', k === tool);
      }
      btns.forEach((b) => b.classList.toggle('active', b.dataset.tool === tool));
      try { localStorage.setItem(KEY, tool); } catch (e) { /* sin storage */ }
    }

    btns.forEach((b) => { b.onclick = () => show(b.dataset.tool); });
    show(localStorage.getItem(KEY) || 'weather');

    // Broma "Próximamente" 😄 — guiño a algo que quizá integremos después. Por ahora no hace
    // nada: al click suelta un mensajito al azar (sin repetir el anterior). Cuando exista de
    // verdad, este botón se convierte en un tool más con su data-tool.
    const SOON = [
      '¿A dónde tan rápido, desesperao? 😄 Esto todavía ni despega 🛫',
      'Calma, que pareces un Concorde con prisa 🛩️💨 — ya viene en camino',
      "Aquí no hay na' todavía… pero suena bonito, ¿verdad? 😎",
      'Tú más adelantao que un vuelo que sale antes del STD 😂',
      'Próximamente… apenas ONAMET dé buen tiempo ⛅',
      'Tranquilo, jefe, que Roma no se construyó en un solo deploy 🏗️',
      'Esto está en WDA 🔧 — operación en mantenimiento; hoy no despega 😅',
      'Va a llegar en AZA (tarde)… pero va a llegar, tranquilo 🛬',
    ];
    const toastEl = document.getElementById('suite-toast');
    let toastT; let lastSoon = -1;
    function suiteToast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      clearTimeout(toastT);
      toastT = setTimeout(() => toastEl.classList.remove('show'), 3400);
    }
    // Onda circular que se expande desde el punto del click (detalle bonito en "Próximamente").
    function spawnRipple(x, y) {
      const r = document.createElement('span');
      r.className = 'ripple';
      r.style.left = x + 'px'; r.style.top = y + 'px';
      document.body.appendChild(r);
      setTimeout(() => r.remove(), 600);
    }
    document.querySelector('[data-soon]')?.addEventListener('click', (e) => {
      spawnRipple(e.clientX, e.clientY);
      let i; do { i = Math.floor(Math.random() * SOON.length); } while (i === lastSoon && SOON.length > 1);
      lastSoon = i;
      suiteToast(SOON[i]);
    });

    document.getElementById('suite-ver').textContent = VERSION;
    document.getElementById('yr').textContent = new Date().getFullYear();
    document.title = 'Aero Suite ' + VERSION + ' · PUJ';
  </script>
</body>
</html>
